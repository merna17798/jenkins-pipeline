[tool.black]
# Maximum line length (default is 88)
line-length = 88
# Target Python version
target-version = ['py310', 'py311', 'py312']
# Files and directories to include
include = '\.pyi?$'
# Files and directories to exclude
extend-exclude = '''
/(
    \.venv
    | venv
    | \.git
    | __pycache__
    | build
    | dist
)/
'''
